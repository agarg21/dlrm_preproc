# docker-compose.yml — dlrm_preproc
#
# Services:
#   export     — generates artifacts/preproc.pt (must run before training)
#   train      — full training loop (3 epochs × 200 steps × B=128)
#   cpp_runner — C++ preproc_runner binary (reads the same .pt artifact)
#
# Quick start:
#   docker compose run --rm export
#   docker compose run --rm train
#   docker compose run --rm cpp_runner
#
# The `artifacts/` directory is volume-mounted into every container so
# the .pt file generated by `export` is immediately available to `train`
# and `cpp_runner` without rebuilding the image.

version: "3.9"

# ── shared config ────────────────────────────────────────────────────────────
x-base: &base
  image: dlrm_preproc:latest
  build:
    context: .
    target: runtime
  volumes:
    # Persist generated .pt artifacts across containers
    - ./artifacts:/app/artifacts
  environment:
    # Limit PyTorch inter-op threads to avoid over-subscribing on a laptop
    - OMP_NUM_THREADS=4
    - MKL_NUM_THREADS=4

# ── services ─────────────────────────────────────────────────────────────────
services:

  # 1. Export the TorchScript preproc module
  export:
    <<: *base
    command: ["python", "-m", "preproc.export", "--out", "artifacts/preproc.pt"]

  # 2. Full DLRM training
  train:
    <<: *base
    command:
      - python
      - -m
      - trainer.train
      - --epochs
      - "3"
      - --steps
      - "200"
      - --batch
      - "128"
      - --emb-dim
      - "64"
      - --lr
      - "0.01"
      - --log-every
      - "50"
      - --preproc
      - artifacts/preproc.pt

  # 3. C++ preproc_runner (uses pre-built binary baked into the image)
  cpp_runner:
    <<: *base
    # Override the image to use the cpp target (includes the binary)
    image: dlrm_preproc:cpp
    build:
      context: .
      target: cpp
    command:
      - /app/build/preproc_runner
      - artifacts/preproc.pt
      - --batch
      - "128"
